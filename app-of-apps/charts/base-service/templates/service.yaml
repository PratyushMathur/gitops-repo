{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ default .Chart.Name .Values.nameOverride }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ default .Chart.Name .Values.nameOverride }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
{{- end }}
